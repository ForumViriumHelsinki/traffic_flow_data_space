  # =========================================================================
  # Umbrella charts themselves (informational — we do NOT deploy these)
  # =========================================================================

  - name: authority
    aliases: [governance-authority]  # name change at v3.1.0; the v3.0.x name was governance-authority
    deployed: false
    parent: null
    repo: https://code.europa.eu/api/v4/projects/902/packages/helm/stable
    repo_kind: gitlab-helm  # NEW in v3.1.0: published as a Helm chart, not a git-source umbrella
    pinned_version: 3.1.0  # candidate target per the adopted strategy (FVH would consume via subchart-bypass per Option 1)
    umbrella_recommended: 3.1.0
    latest_version: 3.1.0
    source_repo: https://code.europa.eu/simpl/simpl-open/development/agents/governance-authority
    source_ref: v3.1.0
    chart_yaml_appVersion: ${PROJECT_RELEASE_VERSION}
    chart_dependencies:
      # v3.1.0 distributes the umbrella as 3 subcharts:
      - authority-iaa 1.2.17  # IAA components (auth-provider, users-roles, tier1/2-gateway, sap, onboarding, identity-provider, tier2-proxy, ejbca, redis, plus 5 fe-* charts enabled by default, plus bitnami/keycloak 25.2.0)
      - authority-gaia-x-edc 1.0.1
      - authority-monitoring 0.0.6  # subsumes the eck-monitoring / eck-operator / eck-operator-crds bundle that was previously in common_components
    template_kinds: ["argoproj.io/v1alpha1 Application (filtered out by simpl-helm CMP when consumed via the bypass pattern)"]
    prometheus_refs: []
    eck_refs: []
    monitoring_refs: []
    monitoring_toggle: monitoring.enabled
    crossplane_refs: []
    notes: |
      RENAMED + RESHAPED at v3.1.0. The v3.0.x umbrella was a git-sourced
      `governance-authority` chart with ~25 nested chart references in
      charts/values.yaml. v3.1.0 publishes a Helm chart `authority` at
      project 902 that internally pins 3 subcharts.

      Per the adopted strategy (Option 1), FVH continues to bypass this
      umbrella entirely — we do NOT deploy the `authority` chart; we
      continue to materialise individual ArgoCD Applications and bump
      each component's targetRevision to match what `authority-iaa v1.2.17`
      would pin (see the per-component entries above for the v3.1.0
      pinned_version values).

      An Option-2 path (deploy `authority` v3.1.0 as a single Application
      with `extraValues.<component>.enabled: false` overrides) is sequenced
      as a separate follow-up after Option 1 succeeds.

  - name: common_components
    deployed: false
    parent: null
    repo: https://code.europa.eu/simpl/simpl-open/development/agents/common_components.git
    repo_kind: gitlab-git
    pinned_version: v3.0.2  # last v3.0.x release; v3.1.0 subsumes common-components content into the authority umbrella
    umbrella_recommended: subsumed-into-authority-3.1.0
    latest_version: v3.1.0
    source_repo: https://code.europa.eu/simpl/simpl-open/development/agents/common_components
    source_ref: v3.0.2
    chart_yaml_appVersion: ${PROJECT_RELEASE_VERSION}
    chart_dependencies:
      - openbao_init (SIMPL 1347)
      - openbao_config (SIMPL 1258)
      - openbao (openbao-helm)
      - "monitoring.operator → eck-operator (helm.elastic.co)"
      - "monitoring → eck-monitoring (SIMPL 828, v0.3.3)"
      - vault_webhook (bank-vaults oci)
      - confluent_operator (packages.confluent.io)
      - kafka (SIMPL 976)
      - redpanda (charts.redpanda.com)
      - pg_operator (zalando)
      - pg_admin (helm.runix.net)
      - pg_cluster (SIMPL 1024)
      - notification (SIMPL 1002)
      - mailpit (jouve)
      - infrastructure_consumption_monitoring_service (SIMPL 1240)
    template_kinds: ["argoproj.io/v1alpha1 Application (filtered by simpl-helm CMP when consumed via the bypass pattern)"]
    prometheus_refs: []
    eck_refs: []
    monitoring_refs: []
    monitoring_toggle: monitoring.enabled
    crossplane_refs: []
    notes: |
      SUBSUMED INTO `authority` AT v3.1.0. The v3.1.0 stack consolidates
      common-components content into the single published `authority` Helm
      chart (project 902) as the `authority-iaa`, `authority-gaia-x-edc`,
      and `authority-monitoring` subcharts. There is no standalone v3.1.0
      `common_components` release on the upstream release track that maps
      one-to-one with the v3.0.2 shape — the `v3.1.0` tag on project 951
      reflects the consolidation, not a continuation of the v3.0.x
      structure.

      FVH continues to bypass this umbrella per the adopted bypass-the-umbrella strategy (Option 1) — we
      materialise individual ArgoCD Applications for each former
      common-components child (kafka, confluent-operator, openbao,
      openbao-config, mailpit, redpanda console, notification, icm,
      vault-secrets-webhook, pgadmin4). The per-component entries
      above carry the candidate v3.1.0 pins (which for these charts
      are mostly unchanged — the v3.1.0 component table only bumps
      the 8 IAA components).

summary:
  # Counts derived programmatically from the entries above. Breakdown:
  #   total = deployed + umbrella_only_count + umbrella_charts
  #         = 27 + 13 + 2 = 42
  #   deployed = upstream_simpl_count + upstream_third_party_count + fvh_internal_count
  #            = 16 + 9 + 2 = 27
  #     (28 ArgoCD apps in the simpl-eval ApplicationSet — cloudsql-proxy is
  #      deployed twice (common + governance namespaces) but counted once here.)
  total: 42
  deployed: 27   # 16 SIMPL upstream + 9 third-party + 2 FVH internal (cloudsql-proxy counted once although deployed twice)
  upstream_simpl_count: 16   # deployed gitlab-helm charts from code.europa.eu
  upstream_third_party_count: 9   # deployed third-party charts (helm/oci/bitnami)
  fvh_internal_count: 2   # cloudsql-proxy, simpl-eval-bridge-secrets
  umbrella_charts: 2   # authority (formerly governance-authority), common_components (informational; not deployed)
  umbrella_only_count: 13   # entries deployed:false that are NOT the umbrella charts themselves:
                            #   9 SIMPL upstream: pg-cluster, openbao-init, eck-monitoring,
                            #     fe-authentication-provider, fe-users-and-roles, fe-identity-provider,
                            #     fe-onboarding, fe-security-attribute-provider, schema-manager-ui
                            #   4 third-party: postgres-operator, eck-operator, eck-operator-crds, redis-commander
  on_par_with_umbrella: 15   # deployed charts whose pinned_version equals umbrella_recommended;
                             # 4 deployed charts have umbrella_recommended: null (simpl-fe,
