# SIMPL-Open Helm Chart Inventory (Forum Virium Helsinki, simpl-eval ApplicationSet)
#
# baseline: authority-iaa v1.2.23 (Option 1 / bypass-the-umbrella adopted; IAA component bumps completed 2026-06-15)
# refresh:  2026-06-15
#
# Per the adopted strategy (Option 1, accepted), FVH continues the bypass-the-umbrella
# pattern: we materialise individual ArgoCD Applications and pin each IAA
# component to the coherent `authority-iaa v1.2.23` set (the release whose
# realm exports + keycloak-authenticator SPI 2.7.1 we deploy). This is one
# IAA patch AHEAD of what the v3.1.0 umbrella ships (`authority-iaa v1.2.17`)
# — see the adoption analysis for why. The published umbrella chart
# `authority` at code.europa.eu/api/v4/projects/902/packages/helm/stable
# v3.1.0 (authority-iaa 1.2.17 + authority-gaia-x-edc 1.0.1 +
# authority-monitoring 0.0.6 as 3 subcharts) is NOT deployed by FVH.
#
# `pinned_version` is FVH's actual pin (the v1.2.23 set for IAA components).
# `umbrella_recommended` is what `governance-authority v3.1.0` ships
# (authority-iaa v1.2.17) — so for the 8 IAA components the two now DIVERGE
# (FVH ahead by one patch; authentication-provider is the exception — FVH
# stays on the 2.8.1 fork, behind the umbrella's 2.12.4). The actual deployed
# state still tracks the pre-sync pins until ArgoCD syncs — see
# the internal live-version snapshot for live deployed versions.
#
# Method
# ------
# Per-app entries derived from `argocd/applicationsets/simpl-eval/apps/*.yaml`
# (28 ArgoCD Applications, deployed: true) plus the v3.1.0 / authority-iaa
# v1.2.17 component pin table from the adoption analysis. Umbrella-only entries derived from the v3.1.0 umbrella shape
# documented in the adoption decision.
#
# `latest_version` for SIMPL charts comes from the GitLab REST API tag list
# (`/projects/<id>/repository/tags?order_by=updated`), refreshed 2026-05-26.
# Latest versions for third-party charts come from the chart-repo
# `index.yaml` or the upstream GitHub releases API. Where outbound auth
# was required (Bitnami pay-walled registry, GHCR OCI tags), the field is
# set to `unknown-auth-required` per the agent contract.
#
# `umbrella_recommended` is the version pinned by `authority-iaa v1.2.17`
# (governance-authority v3.1.0). For charts the v3.1.0 umbrella does not
# pin (e.g. FVH-internal helm/cloudsql-proxy, helm/simpl-eval-bridge-secrets),
# the field is null. For charts where FVH deliberately overrides the
# umbrella's chart choice (e.g. keycloakx vs bitnami/keycloak, or simpl-fe
# which v3.1.0 replaces with 5 per-component fe-* charts), the field is
# null with a note explaining why.
#
# `monitoring_refs` and `crossplane_refs` were resolved by listing
# `templates/` of every chart via the GitLab repository tree API (or, for
# third-party charts, by chart-repo inspection / known defaults). Per the
# Phase-2 BROAD-scope decision, monitoring_refs is split into TWO
# sub-fields per chart so the Prometheus-stack vs. Elastic-stack
# question stays separable:
#   - prometheus_refs: templates referencing monitoring.coreos.com/* kinds
#                      (ServiceMonitor, PodMonitor, PrometheusRule).
#   - eck_refs:        templates referencing *.k8s.elastic.co kinds
#                      (Elasticsearch, Kibana, ApmServer, Beat,
#                       Logstash; ECK-CRD set).
# Backwards-compat: the legacy `monitoring_refs` key is preserved as the
# union of the two for any tooling still reading it.
# No SIMPL chart emits ServiceMonitor / PodMonitor / PrometheusRule
# resources — the SIMPL stack uses Elastic Cloud Operator (ECK) CRDs
# (eck-monitoring chart) rather than the Prometheus Operator stack. No
# SIMPL chart references crossplane.io / Composition / XRD APIs. The
# umbrella `monitoring.enabled` toggle in common_components gates the
# `eck-monitoring` AND `eck-operator` Applications — not Prometheus
# stack assets. (See the `audit/monitoring-eck-coupling.md` Phase-2
# auditor output for the full per-chart yes/no.)
#
# CMP placeholder substitution (`containers/argocd-cmp/internal/cmp`)
# replaces `${PROJECT_RELEASE_VERSION}`, `${NAMESPACE}`, `${ARGOCDNAMESPACE}`,
# `${PROJECT}`, `${NAMESPACETAG}`, and `${AUTHNAMESPACETAG}` at template
# time. The placeholders affect chart-version stamps and metadata only;
# they do not introduce new manifest kinds that would alter monitoring or
# Crossplane scan results.
#
# Schema notes
# ------------
# - parent: "governance-authority" | "common-components" | null. A chart can
#   appear in BOTH umbrellas (e.g. vault-secrets-webhook is referenced by
#   common_components only — both umbrellas pin it but only one deploys).
#   When deployed as a standalone Application, parent is recorded as the
#   umbrella that originally specified the dependency.
# - chart_yaml_appVersion: literal value of `appVersion` in the chart's
#   Chart.yaml. SIMPL charts use the `${PROJECT_RELEASE_VERSION}` token,
#   which CMP rewrites to the chart_version at render time.
# - monitoring_toggle: dotted path of the values key that gates monitoring
#   resources. `none` if the chart has no toggle (i.e. always emits
#   monitoring resources, or never emits them).
# - umbrella_recommended: chart version pinned by the v3.1.0 umbrella
#   (authority-iaa v1.2.17 subchart); null if the umbrella does not
#   reference this chart.

charts:
  # =========================================================================
  # SIMPL-Open charts — code.europa.eu/api/v4/projects/<id>/packages/helm/stable
  # =========================================================================

  - name: poc-charts
    aliases: [adapter]
    deployed: true
    parent: governance-authority
    repo: https://code.europa.eu/api/v4/projects/759/packages/helm/stable
    repo_kind: gitlab-helm
    pinned_version: 1.0.14
    umbrella_recommended: 1.0.14
    latest_version: 1.0.23
    source_repo: https://code.europa.eu/simpl/simpl-open/development/agents/adapters/poc-adapter
    source_ref: v1.0.14
    chart_yaml_appVersion: ${PROJECT_RELEASE_VERSION}
    chart_dependencies: []
    template_kinds: [Deployment, Ingress, Service, ServiceAccount]
    prometheus_refs: []
    eck_refs: []
    monitoring_refs: []
    monitoring_toggle: none
    crossplane_refs: []
    notes: "Adapter (POC). authority-iaa v1.2.17 does not pin a different version — on par with v3.1.0 candidate. Vault-injected secrets via `vault.hashicorp.com/*` annotations on the Deployment, not via PrometheusRule."

  - name: authentication-provider
    deployed: true
    parent: governance-authority
    repo: ghcr.io/forumviriumhelsinki  # FVH fork (vendored at helm/authentication-provider); NOT the upstream project 939 registry
    repo_kind: oci
    pinned_version: 2.8.1  # FVH fork @ upstream 2.8.0 baseline (internal ref) — NOT the v1.2.17/v1.2.23 upstream chart 2.12.4
    umbrella_recommended: 2.12.4  # what governance-authority v3.1.0 / authority-iaa v1.2.17 (and v1.2.23) ship
    latest_version: 2.12.4  # latest upstream chart (project 939); FVH stays on the fork
    source_repo: https://github.com/ForumViriumHelsinki/infrastructure  # helm/authentication-provider (fork of upstream project 939)
    source_ref: helm/authentication-provider
    chart_yaml_appVersion: ${PROJECT_RELEASE_VERSION}
    chart_dependencies: []
    template_kinds: [ConfigMap, Deployment, HPA, Job, Role, RoleBinding, Service, ServiceAccount]
    prometheus_refs: []
    eck_refs: []
    monitoring_refs: []
    monitoring_toggle: none
    crossplane_refs: []
    notes: |
      FVH deploys a FORK pinned at 2.8.1 (upstream 2.8.0 baseline, vendored at
      helm/authentication-provider, published to GHCR; internal refs), NOT the
      upstream 2.12.4 that authority-iaa v1.2.17/v1.2.23 pins. The fork's only
      delta vs upstream 2.8.0 is the create-secret Job: a deterministic name +
      post-install/post-upgrade Helm hook, which ended the permanent ArgoCD
      Missing/OutOfSync (every other template byte-identical). The
      cosmetic-Missing hook fix upstream landed in 2.14.0-SNAPSHOT.2066
      (authority-iaa v1.4.x) — NOT in v3.1.0 / v1.2.23 — so a forward bump to
      the stable 2.12.x line would reintroduce the issue; that is why FVH stays
      on the fork. passCredentials required for the ghcr.io OCI registry. This
      is the one IAA component where FVH is BEHIND the umbrella's recommended
      pin (by deliberate choice), not ahead."

