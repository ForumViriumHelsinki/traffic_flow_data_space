                             # excluded from the comparison. As of 2026-06-15 the 8 IAA
                             # components no longer match the v3.1.0 umbrella's v1.2.17 pins:
                             # 7 are AHEAD (FVH on the v1.2.23 set) and 1 is BEHIND.
  ahead_of_umbrella: 7       # users-roles, onboarding, tier1-gateway, security-attributes-provider,
