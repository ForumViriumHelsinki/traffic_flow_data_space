# SIMPL-Open Image Inventory (Forum Virium Helsinki, simpl-eval ApplicationSet)
# Refresh: 2026-05-26 — chart pins updated to v3.1.0 candidate state per the adopted bypass-the-umbrella strategy (Option 1).
# Companion to charts.yaml; image tags track the authority-iaa component pins
# documented there.
#
# STALE — the per-component `used_by_chart` / `targetRevision` annotations below
# still carry the 2026-05-26 *candidate* numbers (authority-iaa v1.2.17 set, plus
# an authentication-provider 2.12.4 candidate that was never realized — it stayed
# on the 2.8.1 fork). As of 2026-06-15 the live IAA set is authority-iaa v1.2.23
# (tier1-gateway 2.12.6, sap 2.12.4, tier2-gateway 2.11.4, identity-provider
# 2.11.4, tier2-proxy 1.5.5; users-roles 2.12.9 / onboarding 2.12.8). The single
# source of truth for live chart/image versions is **charts.yaml** (refreshed to
# v1.2.23) and the internal live-version snapshot; prefer those over the
# numbers below until this inventory is reconciled in full.
# Tags still placeholder (`<chart-pinned>`) for
# SIMPL service images — verifying tags requires a chart render with network
# egress to code.europa.eu (see the `caveat:` in summary at bottom).
#
# Method
# ------
# This file is the output of an image-inventory pass over the 28 ArgoCD
# Applications under `argocd/applicationsets/simpl-eval/apps/*.yaml`.
#
# The originally requested method was: pull each chart, render with the CMP
# placeholder substitution (containers/argocd-cmp), and grep `image:` from
# the rendered output. The execution sandbox for this run blocked invocation
# of `helm` and outbound chart pulls (network egress / `code.europa.eu`
# auth), so all SIMPL-* charts (those whose repoURL is on code.europa.eu)
# could not be rendered. Their image entries below are therefore INFERRED
# from:
#   1. Explicit `image:` overrides set in our `valuesObject` blocks
#      (high confidence — these run as-written).
#   2. Documented chart defaults for well-known third-party charts on
#      public chart hubs (Bitnami, Codecentric, Confluent, Keyfactor,
#      Bank-Vaults, Redpanda, Runix, Mailpit/Jouve, OpenBao, ingress-nginx).
#   3. SIMPL-Open project convention: charts published on
#      code.europa.eu/simpl/* pull their runtime images from the matching
#      registry.code.europa.eu/simpl/* OCI registry. The exact image:tag
#      pairs for each SIMPL service depend on the chart's bundled values
#      and have NOT been verified by template render — see the
#      `render_failures:` block at the bottom.
#
# Each entry's `confidence:` field flags how the ref was determined.
# Charts whose images we could not enumerate at all (only the Helm chart
# coordinates are known) are listed in `render_failures:`.
#
# Self-check
# ----------
# - All 27 distinct apps (28 files; cloudsql-proxy appears twice for two
#   namespaces) attempted via static analysis.
# - Image list is deduped by ref (image:tag).
# - `leaking_monitoring_images:`, `leaking_crossplane_images:`,
#   `ec_specific_registries:`, and `render_failures:` blocks present.

images:
