leaking_monitoring_images:
  # Empty in current configuration.
  #
  # Our common-components-local.yaml sets `monitoring.enabled: false`,
  # and the SIMPL umbrella honors that flag — none of the per-app
  # apps/*.yaml manifests include a Prometheus/Grafana/blackbox-exporter
  # image. The simpl-monitoring chart is NOT in the simpl-eval
  # ApplicationSet at all.
  #
  # Caveat: this conclusion is based on the values overrides we ship,
  # not a confirmed render. A chart that ignores the global
  # `monitoring.enabled` flag would leak — verify on render.
  []

leaking_crossplane_images:
  # Empty.
  # No Crossplane provider images are referenced from any of the 28
  # apps. SIMPL-Open does not bundle Crossplane in the common_components
  # or governance-authority umbrellas as of v2.4.x.
  []

ec_specific_registries:
  - registry: registry.code.europa.eu
    requires_auth: true
    used_by_apps:
      - adapter
      - authentication-provider
      - identity-provider
      - onboarding
      - sap (security-attributes-provider)
      - users-roles
      - tier1-gateway
      - tier2-gateway
      - tier2-proxy
      - frontend (simpl-fe)
      - xsfc-catalogue (fc-service)
      - icm (infrastructure-consumption-monitoring-service)
      - notification (simpl-notification-service)
      - schema-manager
      - openbao-config
    portability_blocker: |
      All SIMPL business services. To deploy SIMPL outside an
      EC-authenticated environment, mirror these images to
      ghcr.io/forumviriumhelsinki/simpl/* and override
      `image.repository` (or equivalent values key) on each chart.
    chart_repo_also_ec_specific: |
      Every "code.europa.eu/api/v4/projects/<NNN>/packages/helm/stable"
      Helm repoURL is on the same EC infrastructure. The Helm chart
      pulls themselves work without auth (the GitLab packages API allows
      anonymous reads), but the images they reference do not.

  - registry: code.europa.eu (Helm chart hosting only, anonymous-readable)
    requires_auth: false
    used_by_apps: "all charts whose repoURL begins with code.europa.eu/api/v4/..."
    portability_blocker: |
      Not strictly a blocker — the GitLab packages API serves charts
      anonymously — but creates a coupling: if EC pulls a chart version
      or rotates the URL, our deploys break. Mitigation: mirror chart
      tarballs to GHCR's OCI registry alongside the images.

pull_secrets_referenced:
  # Pull-secret names that SIMPL charts may hardcode in pod specs.
  # These need to be created in each target namespace OR injected by
  # Kyverno (FVH already runs `add-ghcr-namespace-label` Kyverno policy
  # to inject `ghcr-login-secret` — needs an EC-equivalent for SIMPL
  # private images).
  - name: regcred
    likely_namespaces: [simpl-eval-common, simpl-eval-governance]
    confidence: convention
  - name: gitlab-secret
    likely_namespaces: [simpl-eval-common, simpl-eval-governance]
    confidence: convention
  - name: ghcr-login-secret
    likely_namespaces: [argocd, simpl-eval-common, simpl-eval-governance]
    confidence: confirmed
    notes: |
      FVH ClusterExternalSecret — provisioned automatically into
      namespaces labeled `ghcr.forumvirium.fi/pull=enabled`. Used for
      pulling our containers-argocd-cmp sidecar.

render_failures:
  # Charts the script attempted but could not render due to sandbox.
  # All entries here have known coordinates (chart + repoURL +
  # targetRevision) and known purpose; only the exact image:tag pairs
  # could not be enumerated.
  - app: adapter
    chart: poc-charts
    repoURL: https://code.europa.eu/api/v4/projects/759/packages/helm/stable
    targetRevision: 1.0.14
    error: |
      Sandbox blocks `helm pull` and outbound network. Image tag is
      pinned by the chart's bundled values.image.tag.
  - app: authentication-provider
    chart: authentication-provider
    repoURL: https://code.europa.eu/api/v4/projects/939/packages/helm/stable
    targetRevision: 2.12.4  # v3.1.0 candidate (bumped from 2.8.0)
    error: same as above
  - app: ejbca
    chart: ejbca-community-helm
    repoURL: https://keyfactor.github.io/ejbca-community-helm
    targetRevision: 1.0.7
    error: |
      Public chart — would render successfully outside sandbox. Default
      image is keyfactor/ejbca-ce, tag = chart appVersion.
  - app: frontend
    chart: simpl-fe
    repoURL: https://code.europa.eu/api/v4/projects/769/packages/helm/stable
    targetRevision: 2.7.1
    error: same as adapter
