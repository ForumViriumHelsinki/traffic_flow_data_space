    needs_pull_secret: false
    is_monitoring: false
    is_crossplane: false
    is_ec_specific: false
    portability_concern: ""
    confidence: explicit_override
    notes: |
      Set explicitly in apps/keycloak.yaml valuesObject.image to replace
      Bitnami's pay-walled / corrupted Keycloak image. quay.io is public
      and unauthenticated — no portability concern.

      v3.1.0 SPECIAL CASE: The upstream v3.1.0 / authority-iaa v1.2.17
      umbrella switches the Keycloak chart back to `bitnami/keycloak 25.2.0`
      (image `docker.io/bitnami/keycloak:25.2.0` or the pay-walled
      `bitnamilegacy/keycloak:25.2.0`). FVH OVERRIDES this back to
      `codecentric/keycloakx 7.1.8` with this explicit
      `quay.io/keycloak/keycloak:25.0.6` image per the adopted bypass-the-umbrella strategy (Option 1)
      and the project's dependency-management policy (avoid Bitnami).
      See charts.yaml `keycloakx` entry for the full ref chain.

