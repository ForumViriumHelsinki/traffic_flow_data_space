summary:
  # Counts derived programmatically from the entries above. Breakdown:
  #   unique_image_refs_listed = with_known_tag + with_inferred_tag = 3 + 23 = 26
  #   with_inferred_tag splits into 8 chart_default_inferred + 15 registry_inferred_tag_unknown
  #   ec_specific_image_refs = entries with is_ec_specific: true (registry.code.europa.eu)
  apps_total: 28                           # 27 distinct + 1 dup (cloudsql-proxy x2)
  apps_attempted: 28
  apps_rendered_successfully: 0            # sandbox blocked all chart pulls
  apps_partially_inferred: 25              # have Helm chart refs only (28 apps - 3 locally-known)
  apps_fully_known_locally: 3              # bridge-secrets, cloudsql-proxy (common), cloudsql-proxy-governance
  unique_image_refs_listed: 26             # see images: above (3 explicit_override + 8 chart_default_inferred + 15 registry_inferred_tag_unknown)
  unique_image_refs_with_known_tag: 3      # explicit overrides: keycloak, kubectl, cloud-sql-proxy
  unique_image_refs_with_inferred_tag: 23  # 8 chart_default_inferred + 15 registry_inferred_tag_unknown
  ec_specific_image_refs: 15               # all 14 SIMPL business services + openbao-config (Job)
  monitoring_leaks: 0                      # subject to render verification
  crossplane_leaks: 0
  hardcoded_pull_secret_names_to_audit: [regcred, gitlab-secret]
  caveat: |
    All SIMPL chart image tags listed as `<chart-pinned>` MUST be
    verified by an actual chart render. To do so, run from a host
    with helm + network egress to code.europa.eu:

      for f in argocd/applicationsets/simpl-eval/apps/*.yaml; do
        chart=$(yq -r '.chart' "$f")
        repo=$(yq -r '.repoURL' "$f")
        rev=$(yq -r '.targetRevision' "$f")
        [ "$chart" = "" ] && continue
        helm pull --repo "$repo" "$chart" --version "$rev" --untar -d /tmp/sboms
        yq -r '.valuesObject' "$f" > /tmp/sboms/$chart/values-fvh.yaml
        ARGOCD_APP_SOURCE_TARGET_REVISION="$rev" \
        ARGOCD_APP_NAME="simpl-eval-$(yq -r .name $f)" \
        ARGOCD_APP_NAMESPACE="$(yq -r .namespace $f)" \
          helm template /tmp/sboms/$chart -f /tmp/sboms/$chart/values-fvh.yaml \
            | grep -E '^\s*image:' | sort -u
      done

    When tags are obtained, replace each `<chart-pinned>` placeholder
    with the actual `name:tag` string and bump
    summary.unique_image_refs_with_known_tag accordingly.
