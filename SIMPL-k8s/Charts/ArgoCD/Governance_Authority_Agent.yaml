apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'authority01-deployer'
spec:
  project: default
  source:
    repoURL: 'https://code.europa.eu/api/v4/projects/902/packages/helm/stable'
    path: '""'
    targetRevision: 2.3.2
    helm:
      values: |
        values:
          branch: v2.3.2
        project: default
        namespaceTag: 
          authority: authority01
          common: common01
        domainSuffix: ds.helsinki.tfds.io
        resourcePreset: low
        argocd:
          appname: authority01
          namespace: argocd
        cluster:
          address: https://kubernetes.default.svc
          namespace: authority01
          commonToolsNamespace: common01
          issuer: dev-prod
          internalIssuer: self-signed-issuer
        secrets:
          role: example-role
          secretEngine: example
        monitoring:
          enabled: true
    chart: authority
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: authority01
