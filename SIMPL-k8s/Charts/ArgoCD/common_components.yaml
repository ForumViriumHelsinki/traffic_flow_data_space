apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'common01-deployer'
spec:
  project: default
  source:
    repoURL: 'https://code.europa.eu/api/v4/projects/951/packages/helm/stable'
    path: '""'
    targetRevision: 2.3.2
    helm:
      values: |
        values:
          branch: v2.3.2
        resourcePreset: default
        agentList:
          authorities:
            - authority01
          consumers:
            - consumer01
          providers:
            - dataprovider01
        project: default
        namespaceTag: common01
        domainSuffix: ds.helsinki.tfds.io
        argocd:
          appname: common01
          namespace: argocd
        cluster:
          address: https://kubernetes.default.svc
          namespace: common01
          issuer: dev-prod
          kubeStateHost: kube-prometheus-stack-kube-state-metrics.devsecopstools.svc.cluster.local:8080
        secrets:
          secretEngine: example
          role: example-role
        kafka:
          ha: true
          topic:
            autocreate: true
        mailpit:
          enabled: true
        monitoring:
          enabled: false
    chart: common_components
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: common01
